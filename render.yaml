# ─────────────────────────────────────────────────────────────
# Render Blueprint — deploys the FastAPI backend as a Docker web service.
# The Next.js frontend is deployed separately on Vercel.
# Docs: https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────
services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: aio-backend
    runtime: docker
    rootDir: backend
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    # NOTE: Render's free tier has no persistent disk, so /app/storage is
    # ephemeral. That's fine here — processed files auto-delete after 60 min.
    # Upgrade to a paid plan + re-add a `disk:` block for persistent storage.
    envVars:
      - key: ENVIRONMENT
        value: production
      # Your frontend origin(s), comma-separated (e.g. a custom domain).
      # Every *.vercel.app deploy (production + previews) is ALSO allowed
      # automatically by the app's CORS regex — see app/config.py.
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
      - key: MAX_UPLOAD_MB
        value: "1024"
      - key: FILE_RETENTION_MINUTES
        value: "60"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: STORAGE_DIR
        value: /app/storage
      - key: APP_SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
